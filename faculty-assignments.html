<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Assignments – WizUP Faculty</title>
    <meta name="description" content="Create and manage assignments with deadlines" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100vh;
            font-family: "Inter", system-ui, sans-serif;
            background: url("assets/images/bg1.jpg") center/cover no-repeat fixed;
            color: #e2e8f0
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 60% 40%, rgba(0, 0, 0, .2), rgba(0, 0, 0, .82));
            pointer-events: none
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 20px;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(89, 130, 97, .2)
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .logo img {
            width: 80%;
            display: block
        }

        .t-title h1 {
            margin: 0;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: #fff
        }

        .t-title p {
            margin: 0;
            font-size: 11px;
            color: rgba(226, 232, 240, .6)
        }

        .spacer {
            flex: 1
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(86, 211, 100, .9);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700
        }

        .container {
            width: min(1100px, 96vw);
            margin: 22px auto 48px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 16px;
            position: relative;
            z-index: 1
        }

        .card {
            border: 1px solid rgba(89, 130, 97, .25);
            background: rgba(10, 20, 12, .65);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            overflow: hidden
        }

        .card-hd {
            padding: 13px 18px;
            border-bottom: 1px solid rgba(89, 130, 97, .2);
            background: rgba(2, 8, 2, .35);
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .card-hd h2 {
            margin: 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: .7px
        }

        .card-bd {
            padding: 18px
        }

        label {
            display: block;
            font-size: 11px;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: rgba(226, 232, 240, .85);
            margin-bottom: 6px
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 9px 12px;
            border-radius: 10px;
            border: 1px solid rgba(89, 130, 97, .3);
            background: rgba(2, 8, 2, .45);
            color: #e2e8f0;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            margin-bottom: 14px
        }

        textarea {
            min-height: 80px;
            resize: vertical
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #598261;
            box-shadow: 0 0 0 3px rgba(89, 130, 97, .18)
        }

        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            color: #0d1117;
            background: linear-gradient(90deg, #3A5A40, #598261);
            box-shadow: 0 6px 16px rgba(58, 90, 64, .3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            width: 100%;
            justify-content: center;
            transition: .2s
        }

        .btn:hover {
            opacity: .88
        }

        .btn:disabled {
            opacity: .6;
            cursor: not-allowed
        }

        /* Assignment cards */
        .assign-list {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .a-card {
            background: rgba(2, 8, 2, .4);
            border: 1px solid rgba(89, 130, 97, .25);
            border-radius: 12px;
            padding: 14px
        }

        .a-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 8px
        }

        .a-title {
            font-size: 14px;
            font-weight: 700;
            color: #e2e8f0
        }

        .a-subject {
            font-size: 11px;
            color: rgba(86, 211, 100, .85);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-top: 2px
        }

        .a-deadline {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 99px;
            font-weight: 700
        }

        .dl-safe {
            background: rgba(34, 197, 94, .15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, .3)
        }

        .dl-warn {
            background: rgba(245, 158, 11, .15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, .3)
        }

        .dl-over {
            background: rgba(239, 68, 68, .15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, .3)
        }

        .a-desc {
            font-size: 12px;
            color: rgba(148, 163, 184, .8);
            line-height: 1.5;
            margin-bottom: 8px
        }

        .a-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: rgba(148, 163, 184, .6)
        }

        .a-del {
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 700;
            color: #fca5a5;
            cursor: pointer;
            transition: .15s
        }

        .a-del:hover {
            background: rgba(239, 68, 68, .25)
        }

        .empty {
            text-align: center;
            padding: 32px;
            color: rgba(148, 163, 184, .55);
            font-size: 13px
        }

        .empty i {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
            opacity: .4
        }

        @media(max-width:860px) {
            .container {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="topbar">
        <div class="logo"><img src="assets/images/LOGO1.png" alt="WizUP" /></div>
        <div class="t-title">
            <h1>Assignments</h1>
            <p>Create assignments with deadlines for students</p>
        </div>
        <div class="spacer"></div>
        <a href="faculty-dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="container">
        <!-- Create form -->
        <div class="card">
            <div class="card-hd">
                <h2>Create Assignment</h2>
            </div>
            <div class="card-bd">
                <label>Subject</label>
                <select id="subSel">
                    <option value="">— Choose Subject —</option>
                </select>

                <label>Assignment Title</label>
                <input type="text" id="title" placeholder="e.g. Unit 3 Lab Assignment" />

                <label>Description / Instructions</label>
                <textarea id="desc" placeholder="Describe the assignment tasks…"></textarea>

                <label>Deadline</label>
                <input type="datetime-local" id="deadline" />

                <label>Max Marks</label>
                <input type="number" id="maxMarks" value="10" min="1" max="100" />

                <button class="btn" id="createBtn" onclick="createAssignment()">
                    <i class="fa-solid fa-plus"></i> Create Assignment
                </button>
            </div>
        </div>

        <!-- Assignments list -->
        <div class="card">
            <div class="card-hd">
                <h2><i class="fa-solid fa-file-pen" style="color:#86efac;margin-right:6px"></i>My Assignments</h2>
                <span id="countBadge"
                    style="font-size:11px;padding:4px 12px;border-radius:99px;background:rgba(89,130,97,.2);border:1px solid rgba(89,130,97,.3);color:#86efac">0
                    total</span>
            </div>
            <div class="card-bd" id="assignList">
                <div class="empty"><i class="fa-solid fa-file-pen"></i>No assignments yet. Create one!</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vqxhbfbpqwpdbmgtdcik.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxeGhiZmJwcXdwZGJtZ3RkY2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTY1MTMsImV4cCI6MjA4NzM5MjUxM30.U9wuwWRDsUqKef93fl0C1DLu9l_hQ5zKMT9KhOt24xE";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const KEY = "wizup.assignments.v1";
        let currentUser = null;

        function load() { try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch { return []; } }
        function save(a) { localStorage.setItem(KEY, JSON.stringify(a)); }

        function toast(msg, type = "success") {
            const t = document.createElement("div");
            t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;background:${type === "success" ? "#22c55e" : "#ef4444"};box-shadow:0 8px 24px rgba(0,0,0,.4)`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function deadlineClass(dl) {
            const diff = (new Date(dl) - new Date()) / (1000 * 60 * 60 * 24);
            if (diff < 0) return "dl-over";
            if (diff < 3) return "dl-warn";
            return "dl-safe";
        }
        function deadlineLabel(dl) {
            const diff = Math.round((new Date(dl) - new Date()) / (1000 * 60 * 60 * 24));
            if (diff < 0) return "Overdue";
            if (diff === 0) return "Due Today";
            if (diff === 1) return "Due Tomorrow";
            return `Due in ${diff}d`;
        }

        function renderAssignments(list) {
            const el = document.getElementById("assignList");
            document.getElementById("countBadge").textContent = list.length + " total";
            if (!list.length) { el.innerHTML = `<div class="empty"><i class="fa-solid fa-file-pen"></i>No assignments yet. Create one!</div>`; return; }

            el.innerHTML = `<div class="assign-list">${[...list].reverse().map(a => `<div class="a-card">
    <div class="a-top">
      <div>
        <div class="a-title">${a.title}</div>
        <div class="a-subject">${a.subjectName || "Subject"}</div>
      </div>
      <span class="a-deadline ${deadlineClass(a.deadline)}">${deadlineLabel(a.deadline)}</span>
    </div>
    <div class="a-desc">${a.desc || "—"}</div>
    <div class="a-meta">
      <span><i class="fa-solid fa-star"></i> Max: ${a.maxMarks || 10} marks</span>
      <span><i class="fa-solid fa-clock"></i> ${new Date(a.deadline).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}</span>
      <button class="a-del" onclick="deleteAssignment('${a.id}')"><i class="fa-solid fa-trash"></i> Delete</button>
    </div>
  </div>`).join("")}</div>`;
        }

        async function createAssignment() {
            const subSel = document.getElementById("subSel");
            const title = document.getElementById("title").value.trim();
            const desc = document.getElementById("desc").value.trim();
            const deadline = document.getElementById("deadline").value;
            const maxMarks = parseInt(document.getElementById("maxMarks").value) || 10;

            if (!title) { toast("Enter assignment title", "error"); return; }
            if (!deadline) { toast("Set a deadline", "error"); return; }

            const assignment = { id: "A-" + Date.now(), title, desc, deadline, maxMarks, subjectId: subSel.value, subjectName: subSel.options[subSel.selectedIndex]?.text || "Subject", createdAt: new Date().toISOString() };

            const list = load();
            list.push(assignment);
            save(list);
            renderAssignments(list);

            // Also save to Supabase if available
            if (currentUser && subSel.value) {
                await db.from("assignments").insert({ faculty_id: currentUser.id, subject_id: subSel.value, title, description: desc, deadline: new Date(deadline).toISOString(), max_marks: maxMarks }).catch(() => { });
            }

            document.getElementById("title").value = "";
            document.getElementById("desc").value = "";
            document.getElementById("deadline").value = "";
            toast("Assignment created!");
        }

        function deleteAssignment(id) {
            if (!confirm("Delete this assignment?")) return;
            const list = load().filter(a => a.id !== id);
            save(list);
            renderAssignments(list);
            toast("Assignment deleted.");
        }

        async function initPage() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) { window.location.href = "faculty-signin.html"; return; }
            currentUser = session.user;

            const { data: subs } = await db.from("subjects").select("*").eq("faculty_id", currentUser.id);
            const sel = document.getElementById("subSel");
            if (subs && subs.length) {
                subs.forEach(s => { const o = document.createElement("option"); o.value = s.id; o.textContent = s.subject_name; sel.appendChild(o); });
            } else {
                ["Java Programming", "Software Engineering", "Deep Learning"].forEach((n, i) => { const o = document.createElement("option"); o.value = "sub" + i; o.textContent = n; sel.appendChild(o); });
            }

            // Load from Supabase assignments table or fallback to localStorage
            const { data: dbAssignments } = await db.from("assignments").select("*").order("created_at", { ascending: false });
            if (dbAssignments && dbAssignments.length) {
                const mapped = dbAssignments.map(a => ({ id: a.id, title: a.title, desc: a.description, deadline: a.deadline, maxMarks: a.max_marks, subjectId: a.subject_id, subjectName: a.subject_name || "Subject", createdAt: a.created_at }));
                renderAssignments(mapped);
            } else {
                renderAssignments(load());
            }
        }

        initPage().catch(() => renderAssignments(load()));
    </script>
</body>

</html>
