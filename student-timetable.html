<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Timetable – WizUP Student</title>
    <meta name="description" content="Student weekly timetable view" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100vh;
            font-family: "Inter", system-ui, sans-serif;
            background: url("assets/images/bg1.jpg") center/cover no-repeat fixed;
            color: #e2e8f0
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 70% 40%, rgba(0, 0, 0, .18), rgba(0, 0, 0, .80));
            pointer-events: none
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 20px;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(178, 31, 45, .2)
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .logo img {
            width: 80%;
            display: block
        }

        .t-title h1 {
            margin: 0;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: #fff
        }

        .t-title p {
            margin: 0;
            font-size: 11px;
            color: rgba(226, 232, 240, .6)
        }

        .spacer {
            flex: 1
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(252, 148, 148, .9);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700
        }

        /* Container */
        .container {
            width: min(1100px, 96vw);
            margin: 22px auto 48px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 1
        }

        /* Week banner */
        .week-banner {
            background: linear-gradient(135deg, rgba(178, 31, 45, .4), rgba(100, 15, 25, .5));
            border: 1px solid rgba(229, 56, 59, .25);
            border-radius: 14px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .wb-left h2 {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            margin: 0
        }

        .wb-left p {
            margin: 5px 0 0;
            font-size: 12px;
            color: rgba(226, 232, 240, .7)
        }

        .wb-stats {
            display: flex;
            gap: 14px
        }

        .w-stat {
            text-align: center;
            padding: 10px 18px;
            background: rgba(229, 56, 59, .15);
            border-radius: 10px;
            border: 1px solid rgba(229, 56, 59, .25)
        }

        .w-stat .sv {
            font-size: 22px;
            font-weight: 800;
            color: #fca5a5
        }

        .w-stat .sl {
            font-size: 10px;
            color: rgba(226, 232, 240, .7);
            text-transform: uppercase
        }

        /* Timetable */
        .tt-wrap {
            background: rgba(15, 0, 5, .65);
            border: 1px solid rgba(229, 56, 59, .2);
            backdrop-filter: blur(16px);
            border-radius: 14px;
            overflow: hidden
        }

        .tt-hdr {
            display: grid;
            grid-template-columns: 100px repeat(5, 1fr);
            background: rgba(5, 0, 2, .4);
            border-bottom: 1px solid rgba(229, 56, 59, .15)
        }

        .tt-hdr div {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: #fca5a5
        }

        .tt-hdr .time-h {
            color: rgba(148, 163, 184, .6)
        }

        .tt-row {
            display: grid;
            grid-template-columns: 100px repeat(5, 1fr);
            border-bottom: 1px solid rgba(229, 56, 59, .07)
        }

        .tt-row:last-child {
            border-bottom: none
        }

        .tc-time {
            padding: 14px 10px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: rgba(148, 163, 184, .7);
            background: rgba(5, 0, 2, .18);
            border-right: 1px solid rgba(229, 56, 59, .1);
            letter-spacing: .3px;
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .tc {}

        .class-cell {
            padding: 8px;
            min-height: 68px;
            display: flex;
            align-items: stretch
        }

        .class-cell.today {
            background: rgba(229, 56, 59, .05)
        }

        .class-block {
            flex: 1;
            padding: 10px 12px;
            border-radius: 10px
        }

        .class-block.filled {
            background: rgba(178, 31, 45, .25);
            border: 1px solid rgba(229, 56, 59, .4);
            cursor: pointer;
            transition: .15s
        }

        .class-block.filled:hover {
            background: rgba(178, 31, 45, .4)
        }

        .cb-sub {
            font-size: 12px;
            font-weight: 700;
            color: #e2e8f0
        }

        .cb-room {
            font-size: 10px;
            color: rgba(148, 163, 184, .7);
            margin-top: 3px
        }

        /* Today's highlight */
        .today-card {
            background: linear-gradient(135deg, rgba(178, 31, 45, .35), rgba(100, 15, 25, .4));
            border: 1px solid rgba(229, 56, 59, .3);
            border-radius: 14px;
            padding: 16px 22px
        }

        .tc-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 12px;
            color: #fca5a5
        }

        .today-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px;
            background: rgba(5, 0, 2, .3);
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(229, 56, 59, .15)
        }

        .ti-time {
            font-size: 12px;
            font-weight: 700;
            color: #fca5a5;
            flex: 0 0 90px
        }

        .ti-sub {
            font-size: 13px;
            font-weight: 700;
            color: #e2e8f0
        }

        .ti-room {
            font-size: 11px;
            color: rgba(148, 163, 184, .7);
            margin-top: 2px
        }

        .empty {
            text-align: center;
            padding: 28px;
            color: rgba(148, 163, 184, .55);
            font-size: 13px
        }

        @media(max-width:860px) {

            .tt-hdr,
            .tt-row {
                grid-template-columns: 80px repeat(5, 1fr)
            }

            .wb-stats {
                display: none
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="topbar">
        <div class="logo"><img src="assets/images/LOGO1.png" alt="WizUP" /></div>
        <div class="t-title">
            <h1>My Timetable</h1>
            <p>Weekly class schedule</p>
        </div>
        <div class="spacer"></div>
        <a href="student-dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="container">
        <div class="week-banner">
            <div class="wb-left">
                <h2 id="studentName">Student Timetable</h2>
                <p>Academic Year 2025–26 • Semester VI</p>
            </div>
            <div class="wb-stats">
                <div class="w-stat">
                    <div class="sv" id="wk-total">9</div>
                    <div class="sl">Classes/Week</div>
                </div>
                <div class="w-stat">
                    <div class="sv" id="wk-today">2</div>
                    <div class="sl">Today</div>
                </div>
            </div>
        </div>

        <!-- Today's classes -->
        <div class="today-card">
            <div class="tc-title"><i class="fa-solid fa-calendar-day" style="margin-right:6px"></i>Today – <span
                    id="todayDayName">—</span></div>
            <div id="todayBoxes">
                <div class="empty">Loading today's schedule…</div>
            </div>
        </div>

        <!-- Full week timetable -->
        <div class="tt-wrap">
            <div class="tt-hdr">
                <div class="time-h">Time</div>
                <div id="h-mon">Mon</div>
                <div id="h-tue">Tue</div>
                <div id="h-wed">Wed</div>
                <div id="h-thu">Thu</div>
                <div id="h-fri">Fri</div>
            </div>
            <div id="ttBody">
                <div style="text-align:center;padding:28px;color:rgba(148,163,184,.5)">Loading…</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vqxhbfbpqwpdbmgtdcik.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxeGhiZmJwcXdwZGJtZ3RkY2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTY1MTMsImV4cCI6MjA4NzM5MjUxM30.U9wuwWRDsUqKef93fl0C1DLu9l_hQ5zKMT9KhOt24xE";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const SLOTS = ["09:00", "10:00", "11:00", "12:00", "14:00", "15:00", "16:00"];
        const DAY_IDX = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const todayName = DAY_IDX[new Date().getDay()];
        document.getElementById("todayDayName").textContent = todayName;

        // Highlight today's column header
        DAYS.forEach((d, i) => {
            const ids = ["h-mon", "h-tue", "h-wed", "h-thu", "h-fri"];
            if (d === todayName) document.getElementById(ids[i]).style.color = "#ffc559";
        });

        const STATIC_TT = [
            { day: "Monday", start_time: "09:00", end_time: "10:00", room: "Lab 3", subjects: { subject_name: "Java Programming" } },
            { day: "Monday", start_time: "11:00", end_time: "12:00", room: "Room 201", subjects: { subject_name: "Software Engineering" } },
            { day: "Tuesday", start_time: "09:00", end_time: "10:00", room: "Room 301", subjects: { subject_name: "Deep Learning" } },
            { day: "Tuesday", start_time: "14:00", end_time: "15:00", room: "Lab 2", subjects: { subject_name: "Java Programming" } },
            { day: "Wednesday", start_time: "10:00", end_time: "11:00", room: "Lab 2", subjects: { subject_name: "Advanced ML" } },
            { day: "Wednesday", start_time: "11:00", end_time: "12:00", room: "Room 201", subjects: { subject_name: "Software Engineering" } },
            { day: "Thursday", start_time: "09:00", end_time: "10:00", room: "Room 301", subjects: { subject_name: "Minor Project" } },
            { day: "Friday", start_time: "09:00", end_time: "10:00", room: "Lab 3", subjects: { subject_name: "Java Programming" } },
            { day: "Friday", start_time: "11:00", end_time: "12:00", room: "Room 301", subjects: { subject_name: "Deep Learning" } },
        ];

        function renderTodayBoxes(slots) {
            const today = slots.filter(s => s.day === todayName).sort((a, b) => a.start_time.localeCompare(b.start_time));
            document.getElementById("wk-today").textContent = today.length;
            const el = document.getElementById("todayBoxes");
            if (!today.length) { el.innerHTML = `<div class="empty">No classes today!</div>`; return; }
            el.innerHTML = today.map(s => `<div class="today-item">
    <div class="ti-time">${s.start_time} – ${s.end_time}</div>
    <div>
      <div class="ti-sub">${s.subjects?.subject_name || "Subject"}</div>
      <div class="ti-room"><i class="fa-solid fa-location-dot"></i> ${s.room || "—"}</div>
    </div>
  </div>`).join("");
        }

        function renderTT(slots) {
            const lookup = {};
            slots.forEach(s => { lookup[`${s.day}|${s.start_time}`] = s; });
            document.getElementById("wk-total").textContent = slots.length;

            // Dynamically reconstruct timeslots based on actual DB returned times
            const uniqueStarts = [...new Set(slots.map(s => s.start_time))].sort();

            const html = uniqueStarts.map(slot => `<div class="tt-row">
    <div class="tc-time" style="font-size:10px;"><span>${slot}</span></div>
    ${DAYS.map(day => {
                const isToday = day === todayName ? "today" : "";
                const entry = lookup[`${day}|${slot}`];
                if (entry) return `<div class="class-cell ${isToday}">
        <div class="class-block filled" title="${entry.subjects?.subject_name}">
          <div class="cb-sub" style="font-size:10px;">${entry.subjects?.subject_name?.substring(0, 18) || "Sub"}..</div>
          <div class="cb-room"><i class="fa-solid fa-location-dot"></i> ${entry.room?.split('_')[0] || "—"}</div>
        </div>
      </div>`;
                return `<div class="class-cell ${isToday}"><div class="class-block"></div></div>`;
            }).join("")}
  </div>`).join("");

            document.getElementById("ttBody").innerHTML = html;
            renderTodayBoxes(slots);
        }

        async function initPage() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) { window.location.href = "student-signin.html"; return; }
            const { data: profile } = await db.from("profiles").select("full_name").eq("id", session.user.id).single();
            if (profile) document.getElementById("studentName").textContent = (profile.full_name || "Student") + "'s Timetable";

            const { data: tt } = await db.from("timetable").select("*,subjects(subject_name)").order("start_time");
            if (tt && tt.length > 0) {
                renderTT(tt);
            } else {
                renderTT(STATIC_TT);
            }
        }

        initPage().catch(() => renderTT(STATIC_TT));
    </script>
</body>

</html>
