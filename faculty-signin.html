<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Faculty Sign In – WizUP</title>
  <meta name="description" content="Faculty login portal for WizUP University Management System"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;font-family:"Inter",system-ui,sans-serif;color:#fff;background:url("assets/images/bg1.jpg") center/cover no-repeat fixed;position:relative;display:flex;align-items:center;justify-content:flex-start;overflow:hidden}
    .overlay{position:fixed;inset:0;background:radial-gradient(circle at 70% 40%,rgba(0,0,0,.1),rgba(0,0,0,.82));pointer-events:none;z-index:0}
    .page-shell{position:relative;z-index:2;width:100%;padding:40px;display:flex;align-items:center;justify-content:flex-start}
    .signin-card{width:380px;margin-left:80px;background:rgba(89,130,97,.95);border-radius:18px;padding:30px;box-shadow:0 25px 60px rgba(58,90,64,.55)}
    .signin-card::before{content:"";position:absolute;inset:-5px;border-radius:22px;background:rgb(58,90,64);z-index:-1}
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:#fff;text-decoration:none;font-size:12px;font-weight:600;margin-bottom:16px;opacity:.9;transition:opacity .2s,transform .2s}
    .back-btn:hover{opacity:1;transform:translateX(-4px)}
    .signin-header{text-align:center;margin-bottom:22px}
    .avatar{width:68px;height:68px;border-radius:50%;background:#3A5A40;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.3)}
    h1{font-size:21px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
    .subtitle{margin:6px 0 0;font-size:12px;opacity:.88}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.95}
    .input-wrap{position:relative}
    .input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#666}
    input[type=email],input[type=password]{width:100%;padding:11px 12px 11px 38px;border:none;border-radius:9px;font-size:13px;background:#fff;color:#333;transition:box-shadow .2s;outline:none}
    input:focus{box-shadow:0 0 0 3px rgba(255,255,255,.4)}
    .form-options{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:14px}
    .remember{display:flex;align-items:center;gap:6px;cursor:pointer}
    .forgot{color:#fff;text-decoration:none;font-weight:600;opacity:.9}
    .forgot:hover{text-decoration:underline}
    .signin-btn{width:100%;padding:12px;border:none;border-radius:999px;background:#3A5A40;color:#fff;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 18px rgba(58,90,64,.55);transition:background .2s,transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .signin-btn:hover{background:#2d4a32;transform:translateY(-2px);box-shadow:0 10px 28px rgba(58,90,64,.65)}
    .signin-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .error-msg{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:12px;display:none}
    .spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .crest{position:absolute;right:13%;top:50%;transform:translateY(-50%);width:360px;height:360px;border-radius:50%;background:#000;box-shadow:0 25px 60px rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:2;transition:transform .3s,box-shadow .3s}
    .crest:hover{transform:translateY(-50%) scale(1.06);box-shadow:0 35px 80px rgba(0,0,0,.9),0 0 40px rgba(90,160,80,.25)}
    .crest img{max-width:78%;filter:drop-shadow(0 6px 12px rgba(0,0,0,.7));transition:transform .3s}
    .crest:hover img{transform:scale(1.05) rotate(3deg)}
    @media(max-width:900px){.crest{display:none}.signin-card{margin:0 auto;width:100%;max-width:400px}.page-shell{justify-content:center;padding:30px 20px}}
  </style>
</head>
<body>
<div class="overlay"></div>
<div class="page-shell">
  <div class="signin-card" style="position:relative">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Portal</a>
    <div class="signin-header">
      <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
      <h1>Faculty Sign In</h1>
      <p class="subtitle">Access your Faculty Portal & Services</p>
    </div>
    <div class="error-msg" id="errMsg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrap"><i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="your@wizup.edu" required autocomplete="email"/>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap"><i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"/>
        </div>
      </div>
      <div class="form-options">
        <label class="remember"><input type="checkbox" id="rememberMe"/> Remember me</label>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>
      <button type="submit" class="signin-btn" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>
  </div>
  <div class="crest"><img src="assets/images/LOGO1.png" alt="WizUP Logo"/></div>
</div>
<script>
  const SUPABASE_URL = "https://vqxhbfbpqwpdbmgtdcik.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxeGhiZmJwcXdwZGJtZ3RkY2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTY1MTMsImV4cCI6MjA4NzM5MjUxM30.U9wuwWRDsUqKef93fl0C1DLu9l_hQ5zKMT9KhOt24xE";
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("loginForm");
  const errMsg = document.getElementById("errMsg");
  const loginBtn = document.getElementById("loginBtn");

  // check if already logged in
  db.auth.getSession().then(({data:{session}})=>{
    if(session) checkAndRedirect(session.user.id);
  });

  async function checkAndRedirect(uid){
    const {data} = await db.from("profiles").select("role").eq("id",uid).single();
    if(data?.role === "faculty") window.location.href = "faculty-dashboard.html";
    else if(data?.role === "hod") window.location.href = "hod-dashboard.html";
  }

  form.addEventListener("submit", async e=>{
    e.preventDefault();
    errMsg.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.innerHTML = `<span class="spinner"></span> Signing in...`;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const {data,error} = await db.auth.signInWithPassword({email,password});
    if(error){
      errMsg.textContent = error.message;
      errMsg.style.display = "block";
      loginBtn.disabled = false;
      loginBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Sign In`;
      return;
    }
    // Check role
    const {data:profile} = await db.from("profiles").select("role,full_name").eq("id",data.user.id).single();
    if(!profile || (profile.role !== "faculty" && profile.role !== "hod")){
      await db.auth.signOut();
      errMsg.textContent = "Access denied. This portal is for Faculty/HOD only.";
      errMsg.style.display = "block";
      loginBtn.disabled = false;
      loginBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Sign In`;
      return;
    }
    if(profile.role === "faculty") window.location.href = "faculty-dashboard.html";
    else window.location.href = "hod-dashboard.html";
  });
</script>
</body>
</html>
