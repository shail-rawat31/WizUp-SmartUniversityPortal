<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CGPA Calculator – WizUP Student</title>
    <meta name="description" content="Calculate your Semester GPA and Cumulative GPA interactively" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.7);
            --card-border: rgba(229, 56, 59, 0.15);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --brand: #e5383b;
            --brand-hover: #b21f2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: url("assets/images/bg1.jpg") center/cover no-repeat fixed;
            color: var(--text-main);
            position: relative;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 70% 40%, rgba(0, 0, 0, .15), rgba(0, 0, 0, .80));
            pointer-events: none;
            z-index: 0;
        }

        .container,
        .topbar {
            position: relative;
            z-index: 1;
        }

        /* Topbar */
        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            width: 44px;
            height: 44px;
            background: #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo img {
            width: 75%;
        }

        .t-title h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .t-title p {
            margin: 0;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spacer {
            flex: 1;
        }

        .nav-link {
            color: #fca5a5;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: #fff;
        }

        /* Container */
        .container {
            width: min(1000px, 95vw);
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .card-hd {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(229, 56, 59, 0.1);
            background: rgba(229, 56, 59, 0.05);
        }

        .card-hd h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
        }

        .card-bd {
            padding: 20px;
        }

        /* Subjects List */
        .subject-row {
            display: grid;
            grid-template-columns: 1fr 100px 100px 40px;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .subject-row:last-child {
            margin-bottom: 0;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: 0.2s;
        }

        input:focus,
        select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(229, 56, 59, 0.2);
        }

        .btn-del {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }

        .btn-del:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fff;
        }

        /* Buttons */
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
        }

        .btn-add:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-calc {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand), var(--brand-hover));
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(229, 56, 59, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-calc:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(229, 56, 59, 0.5);
        }

        /* Results */
        .result-box {
            text-align: center;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .result-val {
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fca5a5, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .result-meta {
            font-size: 12px;
            color: #fca5a5;
            font-weight: 600;
            background: rgba(229, 56, 59, 0.1);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            margin: 0 auto;
        }

        /* Scale Reference */
        .scale-ref {
            font-size: 11px;
            margin-top: 20px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .scale-ref strong {
            color: #fff;
        }

        .scale-ref span {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-right: 4px;
            margin-bottom: 4px;
        }

        @media(max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        @media(max-width: 600px) {
            .subject-row {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .btn-del {
                grid-column: 1 / -1;
                justify-self: end;
                margin-top: 0;
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="topbar">
        <div class="logo"><img src="assets/images/LOGO1.png" alt="WizUP" /></div>
        <div class="t-title">
            <h1>CGPA Calculator</h1>
            <p>Analyze your academic performance</p>
        </div>
        <div class="spacer"></div>
        <a href="student-dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-hd">
                <h2>Enter Current Semester Grades</h2>
            </div>
            <div class="card-bd" id="coursesList">
                <!-- Subjects container -->
            </div>
            <div class="card-bd" style="padding-top: 0;">
                <button class="btn-add" onclick="addCourseRow()"><i class="fa-solid fa-plus"></i> Add Subject</button>
            </div>
        </div>

        <div class="card">
            <div class="card-hd">
                <h2>Calculated SGPA</h2>
            </div>
            <div class="card-bd">
                <div class="result-box">
                    <div class="result-label">Semester GPA</div>
                    <div class="result-val" id="sgpaDisplay">0.00</div>
                    <div class="result-meta" id="creditsDisplay">0 Total Credits</div>
                </div>

                <button class="btn-calc" onclick="calculate()">Calculate SGPA</button>

                <div class="scale-ref">
                    <p style="margin-bottom:8px;font-weight:700;color:#fff;">UGC 10-Point Scale Reference:</p>
                    <span><strong>O</strong> (10)</span>
                    <span><strong>A+</strong> (9)</span>
                    <span><strong>A</strong> (8)</span>
                    <span><strong>B+</strong> (7)</span>
                    <span><strong>B</strong> (6)</span>
                    <span><strong>C</strong> (5)</span>
                    <span><strong>P</strong> (4)</span>
                    <span><strong>F</strong> (0)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vqxhbfbpqwpdbmgtdcik.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxeGhiZmJwcXdwZGJtZ3RkY2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTY1MTMsImV4cCI6MjA4NzM5MjUxM30.U9wuwWRDsUqKef93fl0C1DLu9l_hQ5zKMT9KhOt24xE";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const gradesMap = { "O": 10, "A+": 9, "A": 8, "B+": 7, "B": 6, "C": 5, "P": 4, "F": 0 };

        const fallbackCourses = [
            { name: "Java Programming", credits: 4, grade: "A+" },
            { name: "Software Engineering", credits: 3, grade: "A" }
        ];

        function createRow(cName = "", cCred = 3, cGrade = "A") {
            const gOpts = Object.keys(gradesMap).map(g => `<option value="${g}" ${g === cGrade ? 'selected' : ''}>${g} (${gradesMap[g]})</option>`).join('');
            return `
        <div class="subject-row">
          <div>
            <label>Subject Name</label>
            <input type="text" placeholder="e.g. Mathematics" value="${cName}" class="c-name" />
          </div>
          <div>
            <label>Credits</label>
            <input type="number" min="1" max="10" value="${cCred}" class="c-credit" />
          </div>
          <div>
            <label>Grade</label>
            <select class="c-grade">${gOpts}</select>
          </div>
          <button class="btn-del" onclick="this.parentElement.remove();"><i class="fa-solid fa-trash"></i></button>
        </div>
      `;
        }

        function addCourseRow() {
            document.getElementById("coursesList").insertAdjacentHTML("beforeend", createRow());
        }

        function calculate() {
            const rows = document.querySelectorAll(".subject-row");
            let totalPts = 0, totalCredits = 0;

            rows.forEach(r => {
                const cred = parseFloat(r.querySelector(".c-credit").value) || 0;
                const gradeLetter = r.querySelector(".c-grade").value;
                const pts = gradesMap[gradeLetter] || 0;
                totalCredits += cred;
                totalPts += (cred * pts);
            });

            const sgpa = totalCredits > 0 ? (totalPts / totalCredits).toFixed(2) : "0.00";
            document.getElementById("sgpaDisplay").textContent = sgpa;
            document.getElementById("creditsDisplay").textContent = `${totalCredits} Total Credits`;

            // Fun effect
            document.getElementById("sgpaDisplay").style.transform = "scale(1.1)";
            setTimeout(() => document.getElementById("sgpaDisplay").style.transform = "scale(1)", 200);
        }

        async function initCalculator() {
            const list = document.getElementById("coursesList");
            const { data: subs } = await db.from("subjects").select("subject_name, subject_code");

            if (subs && subs.length > 0) {
                subs.forEach((s, idx) => {
                    const fakCredit = [2, 3, 4][idx % 3]; // mock credits based on index
                    list.insertAdjacentHTML('beforeend', createRow(s.subject_name.substring(0, 20), fakCredit, "A"));
                });
            } else {
                fallbackCourses.forEach(c => list.insertAdjacentHTML('beforeend', createRow(c.name, c.credits, c.grade)));
            }
            calculate();
        }

        initCalculator();
    </script>
</body>

</html>
